# ── I2C ──────────────────────────────────────────────────
CONFIG_I2C=y

# ── SPI ──────────────────────────────────────────────────
CONFIG_SPI=y

# ── Display ──────────────────────────────────────────────
CONFIG_DISPLAY=y
CONFIG_MIPI_DBI=y
CONFIG_ILI9341=y

# ── Input / Touch ─────────────────────────────────────────
CONFIG_INPUT=y
CONFIG_INPUT_XPT2046=y

# ── LVGL ─────────────────────────────────────────────────
CONFIG_LVGL=y
CONFIG_LV_COLOR_DEPTH_16=y
CONFIG_LV_COLOR_16_SWAP=y
CONFIG_LV_FONT_MONTSERRAT_24=y
CONFIG_LV_Z_AUTO_INIT=n
CONFIG_LV_Z_BUFFER_ALLOC_STATIC=y
CONFIG_LV_Z_MEM_POOL_HEAP_LIB_C=y
CONFIG_LV_Z_BITS_PER_PIXEL=16

# ── Stack ─────────────────────────────────────────────────
CONFIG_MAIN_STACK_SIZE=8192

# ── Logging ──────────────────────────────────────────────
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_MODE_IMMEDIATE=y