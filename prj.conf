# =============================================================================
# Air Quality Monitor — prj.conf
# Target: ESP32-C6-DevKitC-1 v1.2  |  Zephyr 4.3.99 (main)  |  LVGL 9.5
# =============================================================================

# -----------------------------------------------------------------------------
# Core / Memory
# -----------------------------------------------------------------------------
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_HEAP_MEM_POOL_SIZE=65536

# -----------------------------------------------------------------------------
# GPIO (backlight)
# -----------------------------------------------------------------------------
CONFIG_GPIO=y

# -----------------------------------------------------------------------------
# SPI — ILI9341 display + XPT2046 touch (shared bus)
# -----------------------------------------------------------------------------
CONFIG_SPI=y

# -----------------------------------------------------------------------------
# Display driver
# CONFIG_ILI9341 is the chip-specific symbol; it is only selectable when
# the DTS node with compatible = "ilitek,ili9341" is present (provided by
# the board overlay). CONFIG_ILI9XXX is a hidden parent — never set it directly.
# -----------------------------------------------------------------------------
CONFIG_DISPLAY=y
CONFIG_ILI9341=y

# -----------------------------------------------------------------------------
# LVGL 9.x — display middleware
# -----------------------------------------------------------------------------
CONFIG_LVGL=y

# VDB (Virtual Display Buffer) stripe as % of total framebuffer.
# 10% of 320*240*2 bytes ~ 15 KB across two stripes.
CONFIG_LV_Z_VDB_SIZE=10
CONFIG_LV_Z_MEM_POOL_SIZE=32768

# Flush thread offloads SPI DMA from the main thread.
# NOTE: LV_Z_FLUSH_THREAD_PRIO was renamed to LV_Z_FLUSH_THREAD_PRIORITY.
CONFIG_LV_Z_FLUSH_THREAD=y
CONFIG_LV_Z_FLUSH_THREAD_PRIORITY=7
CONFIG_LV_Z_FLUSH_THREAD_STACK_SIZE=2048

# Color depth RGB565 (16-bit).
# NOTE: LV_COLOR_16_SWAP and ILI9341_RGB565_SWAP do not exist in LVGL 9 /
# Zephyr 4.x. If colours look inverted at runtime, add the property
#   color-swap;
# to the ili9341 node in the board overlay instead.
CONFIG_LV_COLOR_DEPTH_16=y

# Widgets.
# lv_meter was removed in LVGL 9; replaced by lv_scale + lv_line.
# LV_DRAW_COMPLEX no longer exists in LVGL 9 (complex drawing is always on).
CONFIG_LV_USE_SCALE=y
CONFIG_LV_USE_LINE=y
CONFIG_LV_USE_LABEL=y
CONFIG_LV_USE_ARC=y
CONFIG_LV_USE_SPINNER=y

# Touch input — routes XPT2046 events to LVGL pointer device
CONFIG_INPUT=y
CONFIG_LV_Z_POINTER_INPUT=y

# Fonts
CONFIG_LV_FONT_MONTSERRAT_12=y
CONFIG_LV_FONT_MONTSERRAT_14=y
CONFIG_LV_FONT_MONTSERRAT_16=y
CONFIG_LV_FONT_MONTSERRAT_24=y
CONFIG_LV_FONT_MONTSERRAT_28=y

# Default theme
CONFIG_LV_USE_THEME_DEFAULT=y

# -----------------------------------------------------------------------------
# I2C — SGP30 sensor
# -----------------------------------------------------------------------------
CONFIG_I2C=y

# -----------------------------------------------------------------------------
# Sensor — SGP30
# Zephyr 4.x has no built-in SGP30 driver (CONFIG_SGP30 does not exist).
# sgp30.c implements the I2C protocol directly using raw i2c_write/i2c_read.
# CONFIG_SENSOR and CONFIG_SGP30 are intentionally omitted.
# -----------------------------------------------------------------------------

# -----------------------------------------------------------------------------
# Console — ESP32-C6 native USB port (USB Serial/JTAG)
# The chosen node in the overlay points zephyr,console at &usb_serial.
# No additional Kconfig needed — the board defconfig handles USB serial.
# -----------------------------------------------------------------------------
CONFIG_UART_CONSOLE=y

# Logging over USB serial
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_BACKEND_UART=y

